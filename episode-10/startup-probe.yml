apiVersion: v1
kind: Pod
metadata:
  name: startup-demo
spec:
  containers:
    - name: slow-app
      image: nginx
      ports:
        - containerPort: 80
      startupProbe:
        httpGet:
          path: /
          port: 80
        initialDelaySeconds: 0
        periodSeconds: 10
        failureThreshold: 30 # 30 * 10 = 300 seconds (5 minutes) for start
      livenessProbe:
        httpGet:
          path: /
          port: 80
        initialDelaySeconds: 0
        periodSeconds: 10
      readinessProbe:
        httpGet:
          path: /
          port: 80
        initialDelaySeconds: 0
        periodSeconds: 10
