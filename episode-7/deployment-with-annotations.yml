apiVersion: apps/v1
kind: Deployment
metadata:
  name: web-development
  annotations:
    description: "Web application deployment"
    version: "2.0.0"
    kubernetes.io/change-cause: "Update to version 2.0"
spec:
  replicas: 3
  selector:
    matchLabels:
      app: web
  template:
    metadata:
      labels:
        app: web
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8080"
        prometheus.io/path: "/metrics"
    spec:
      containers:
        - name: web
          image: nginx:1.25
          ports:
            - containerPort: 80