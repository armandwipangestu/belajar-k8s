apiVersion: v1
kind: Pod
metadata:
  name: nginx-dev-1
  labels:
    app: nginx
    environment: development
    tier: frontend
spec:
  containers:
    - name: nginx
      image: nginx
---
apiVersion: v1
kind: Pod
metadata:
  name: nginx-dev-2
  labels:
    app: nginx
    environment: development
    tier: backend
spec:
  containers:
    - name: nginx
      image: nginx
---
apiVersion: v1
kind: Pod
metadata:
  name: nginx-prod-1
  labels:
    app: nginx
    environment: production
    tier: frontend
spec:
  containers:
    - name: nginx
      image: nginx
